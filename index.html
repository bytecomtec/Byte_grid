<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Tecnológico Integral</title>
    <style>
        :root {
            --primary: #1a73e8; /* Azul tecnológico */
            --accent: #34a853;  /* Verde para pólizas y soporte */
            --bg: #f8f9fa;
            --text: #202124;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 { font-size: 1.4rem; margin-bottom: 5px; color: var(--primary); }
        p { font-size: 0.9rem; color: #5f6368; margin: 0; }

        /* Contenedor principal estilo Bento Grid */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 450px;
        }

        /* Tarjeta base */
        .card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #e0e0e0;
        }

        .card:active {
            transform: scale(0.96);
            background-color: #f1f3f4;
        }

        .card h3 {
            font-size: 0.85rem;
            margin: 8px 0 0 0;
            font-weight: 600;
        }

        /* Iconos simulados (puedes reemplazarlos con imágenes reales o SVG) */
        .icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        /* Estilos Destacados para romper el encasillamiento */
        .full-width { grid-column: span 2; min-height: 80px; }
        
        .edu-tech { background: #e8f0fe; border-color: var(--primary); }
        .support { background: #e6f4ea; border-color: var(--accent); }
