<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytecomtec - Catálogo</title>
    <style>
        :root {
            --primary: #1a73e8;
            --accent: #34a853;
            --bg: #fdfdfd;
            --text: #202124;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo al 50% de percepción visual */
        .header-logo {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 5px 0 15px 0;
        }

        .header-logo img {
            width: 45%; /* Ajustado para que se vea equilibrado en móviles */
            height: auto;
        }

        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px 8px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card:active { transform: scale(0.96); background: #fafafa; }
        .card h3 { font-size: 0.8rem; margin: 8px 0 0 0; line-height: 1.1; }
        .icon { font-size: 24px; }

        .full-width { grid-column: span 2; }
        .highlight { background: #eff6ff; border-color: #bfdbfe; }
        .success { background: #f0fdf4; border-color: #bbf7d0; }

        /* Botón Inferior Web */
        .web-footer {
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border-radius: 12px;
            color: white;
            text-align: center;
            box-sizing: border-box;
        }

        .btn-web {
            display: inline-block;
            background: white;
            color: #1a73e8;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header-logo">
        <img src="logo.png" alt="Bytecomtec">
    </div>

    <div class="catalog-grid">
        <div class="card full-width highlight" onclick="location.href='URL_PANTALLAS'">
            <span class="icon">🖥️</span>
            <h3>Pantallas Interactivas y Proyectores</h3>
        </div>

        <div class="card" onclick="location.href='URL_AUDIO'">
            <span class="icon">📢</span>
            <h3>Audio Escolar</h3>
        </div>

        <div class="card" onclick="location.href='URL_REDES'">
            <span class="icon">🌐</span>
            <h3>Redes y Wi-Fi</h3>
        </div>

        <div class="card" onclick="location.href='URL_COMPUTADORAS'">
            <span class="icon">💻</span>
            <h3>Cómputo y Smart TVs</h3>
        </div>

        <div class="card" onclick="location.href='URL_CONMUTADORES'">
            <span class="icon">📞</span>
            <h3>Conmutadores</h3>
        </div>

        <div class="card" onclick="location.href='URL_CCTV'">
            <span class="icon">🛡️</span>
            <h3>Videovigilancia (CCTV)</h3>
        </div>

        <div class="card" onclick="location.href='URL_ACCESO'">
            <span class="icon">🔑</span>
            <h3>Control de Acceso</h3>
        </div>

        <div class="card full-width success" onclick="location.href='URL_SOPORTE'">
            <span class="icon">🛠️</span>
            <h3>Soporte y Pólizas de Servicio</h3>
        </div>
    </div>

    <div class="web-footer">
        <p style="margin:0; font-size: 0.9rem;">¿Desea conocer más?</p>
        <a href="https://bytecomtec.com" class="btn-web">Ir a la Página Web</a>
    </div>

    <p style="font-size: 0.6rem; color: #bbb; margin-top: 15px;">&copy; 2026 Bytecomtec</p>

</body>
</html>
